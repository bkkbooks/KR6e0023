body:
  text: 北京李通玄造第一卷菩提場第一會說六品經至第五卷世主妙嚴品第一佛成道在摩竭提國說法於菩提場中往劫與佛同修故令衆海雲集第二卷傍生品類上界諸天如來果海之中各分證解脫第三卷四王八部雜類諸神皆以妙請之詞歌詠難思之法第四卷形色萬類部從千般各說解脫之門偈讚如來功德第五卷如來不思議力菩薩皆從座起流天地降於徵祥海會供無邊諸佛第六卷如來現相品第二大衆同與念請如來現相以酬光聲召於有緣十方新衆雲集第七卷普賢三昧品第三世界成就品第四普賢入藏身三昧如來以聖力加持起定說十海法門廣明世界成立第八卷風輪持於大水大海湧於蓮華安布剎種香河重疊世界於中海第九卷世界成就品華藏世界品第五右旋十海遞相接連交絡重重如天珠網第十卷至第十一卷毗盧舍那品第六所管剎海隨直至於輪圍法界等華藏莊嚴舉果勸同生信樂第十一卷毗盧舍那往劫曾為太子威光供十須彌山微塵數諸如來令獲十蓮華藏世界之果海第十二卷普光明殿第二會說六品經佛名號品第七四聖諦品第八如來名號多種逗生機器不同四生聖諦隨方以立名各令聞法而證悟第十三卷光明覺品第九菩薩問明品第十文殊與九首菩薩問明十種甚深皆顯性相融通破一切衆生疑執第十四卷淨行品第十一賢首品第十二淨行起無邊大願文殊令善用其心賢首彰德行詠收顯信有無涯大用第十五卷賢首品毛光照益三昧舉喻表玄旨幽深歎經難思而勸持諸佛摩頂而隨喜第十六卷忉利天宮第三會說六品經升須彌頂品第十三偈讚品第十四十住品第十五須彌偈讚彰佛德不離而升天十住解門辨菩薩入位之宗趣第十七卷梵行品第十六初發心功德品第十七梵行令了境空寂不生二解之心發心現功德無涯初念便成正覺第十八卷明法品第十八明法說三寶不斷下能安樂人天十行十種法門上求升進之位第十九卷夜摩天宮第四會說四品經升夜摩天宮品第十九偈讚品第二十十行品第二十一夜摩偈讚彰佛德之不窮兼顯十行之法門廣論菩薩之巧妙第二十卷十行品無著等真之四行明自利利他之兩門端證已來難思偈頌再收於前德第二十一卷十無盡藏品第二十二十無盡藏三世諸佛同遵不唯屬十行之法門義亦過回向之勝進第二十二卷都率天宮第五會說三品經升都率天宮品第二十三上升都率化主赴緣覩佛神光天王獲益第二十三卷偈讚品第二十四知足之天偈讚十回向之初顯菩薩悲智無涯長劫救衆生苦第二十四卷至三十三卷十回向品第二十五堅心不壞等諸佛之法門行願彌綸回善逝於時處第二十五卷善因含果立無盡之藏名善根合真即同如性之不盡第二十六卷從施車馬乃至以身大因十段長文內外咸捨第二十七卷菩薩捨連膚頂髻乃至救於殘形以萬行莊嚴其身成十種丈夫之相第二十八卷始終覩佛出現六十種大施之門前後三卷長文總收堅固回向第二十九卷所順衆生無相能隨心行亦如二施廣阿僧祇願生具足於財法第三十卷百門之德一如貫之行善等於虛空亦同性相之彌廣第三十一卷由無相惑縛著得解脫回向之名六種微細智門願證普賢之德第三十二卷羅一身於法界收萬像於毛端回等法界之善根成普賢塵剎之大用第三十三卷依正二果皆以無數寶嚴結歎勸修普賢位之功滿第三十四卷他化天宮第六會說一品經至三十九卷十地品第二十六他化摩尼寶殿創開十地法門三加五請方陳首明初地之相第三十五卷離垢地菩薩修三聚十善之法門八定五通發無邊妙慧之焰相第三十六卷能證智之慧焰進修菩提分之法門寄聲聞四諦觀門顯菩薩勝地之相第三十七卷般若現前十種觀緣起之法遠行時久七地超前後之功第三十八卷不證無生之理由佛致七勸之橋大悲觀衆生十種之稠林大智流菩薩才辨而演法第三十九卷雲雨自他之廣德小分未等於如來於中因果相參多喻校量不測三禪天第七會闕文第四十卷重會普光第八會說十一品經至四十三卷十定品第二十七極果必由初信是故重會法堂普賢承命以宣揚方定陳十定之勝用第四十一卷遍住國土三昧爰及十種莊嚴說菩薩自在神通顯普賢無盡功德第四十二卷差別自在三昧起入之用無他分四口而波濤心流四辨而演說第四十三卷無礙大輪三昧遍法界而為勝能如天衆王之化類等覺而同妙覺第四十四卷十通品第二十八十忍品第二十九卷舒自在辨才辨十種之身神通法喻雙明陳十忍之相第四十五卷阿僧祇品第三十壽量品第三十一菩薩住處品第三十二僧祇壽量表佛德之不窮感應隨方示菩薩之住處第四十六卷至四十七卷不思議法品第三十三大衆懷疑念請未知德相云何青蓮縱辨以返酬談佛不思議之果法第四十七卷始終廣大佛事修乎解脫之門高建勇健之法幢宣暢圓音之遠徹第四十八卷如來十身相海品第三十四隨好光明功德品第三十五十身相海與隨好光明皆顯德用難思因深果遠第四十九卷普賢行品第三十六普賢行品一惑為百萬障門偈頌別明十行參而不雜第五十卷至五十二卷如來出現品第三十七如來出現法喻多門十身含納而融通一理濟平而映徹第五十一卷口辨瀉圓音之相酬明智水之潛流破微塵而出大經剖凡心現聖智第五十二卷境行與成等正覺轉法輪及涅槃親近見聞不空成金剛不壞之堅種第五十三卷三重普光第九會說一品經至五十九卷離世間品第三十八菩薩處世不染即離世間之品現普慧雲興於問端普賢瓶瀉以酬答第五十四卷始從十種欣慰乃至無等住門三百餘段長文以酬十行之相第五十五卷十種無常之意後彰自在等門其中旨趣無邊述前回向之位第五十六卷首題十種無礙至大師子吼之顯文頗有無數法門廣前十地之德第五十七卷斷十種餘習後論勝進之心廣有三十三門通明離垢之行等第五十八卷始從菩薩淨施下至降生十門其中行願而不窮酬因果滿之相矣第五十九卷降生母胎之八相偈勸修持之一心二千出離之行門一部修成之分矣第六十卷祇洹重閣第十會說一品經至八十卷入法界品第三十九如來不離逝多林中入師子頻申三昧菩薩覩法界之神變聲聞皆聾盲而不知第六十一卷普賢以能開十句如來展白毫一光文殊徒從而南行皆顯定門之果德第六十二卷大聖誡善財求友南行訪德雲海雲與善住法門幽奧而不測第六十三卷遇彌迦與解脫長者證旋陀羅尼之妙門後見海幢比丘覩身毛所現之勝事第六十四卷禮休捨瞿沙之友才執手而遊覽十方勸詣勝熱之刀山投火聚而獲三昧第六十五卷始從慈行童女後至明智居士其四人善友皆寄十行之法門第六十六卷寶髻普眼之長者無厭大光之國王不動談禮佛之往因法門含逆順之深意第六十七卷遍行化六趣之形類鬻香主五分之法門無上勝將四拶以度人師子尼處于座談法第六十八卷婆須及觀音菩薩大天與安住地神善友修回向之法門婆珊云初地之聖位第六十九卷夜神普德授遊步解脫之教門喜目身雲供多佛而勢彌遠第七十卷普救縱毫光一道善財獲清淨三輪問答明歷事於多尊遠劫遇良友而開通第七十一卷寂靜與守護城為善財開解脫之門一一並深廣難思重重皆結會今古第七十二卷開敷樹華之友說解脫名太喜光明輪王設法施之作場夜神會修目之古事第七十三卷大願法門善財覩勝妙之邑父王見佛太子免刑戮之愆第七十四卷妙德靈神主十種受生之藏摩耶母腹現三千神變之奇第七十五卷善財訪於瞿波德神示求友之誡遇佛為姻之往事同修行願之勝緣第七十六卷摩耶為諸佛之母儀願處言行之典則其衆藝主光之善友皆會緣入定之所由第七十七卷童子童女誡善財事友百重法慈氏慈念偈讚令歸於本師第七十八卷善財感遇而啓言彌勒具德而能容經有三百餘段顯菩提心勝而功高第七十九卷善財入於閣門見塵剎無邊之劫事法喻問答而退席當成道果而再期第八十卷文殊展手而如持善財功證於極果普賢摩頂而偈勸慎勿疑於此經大永七年亥二月十八日寫畢書寫之志者華嚴經者一代根本法輪直顯如來之內證依之一度觸耳者永離生死之苦報通玄居士者華嚴之祖師講經之叶佛意故從口放金色之光云彼云此不信不可有者也然八十卷之大意才拶盡掌中之紙墨微妙之要術也憲每日為頂戴之不顧料紙之輕乏勵惡筆寫之者也願者三寶冥衆哀愍納受給快憲四十七
